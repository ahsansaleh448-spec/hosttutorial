<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Menu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .menu {
      display: flex;        
      flex-wrap:wrap;     
      gap: 10px;           
      justify-content: center; 
    }

    .item {
      flex-basis: 250px;   
      background: orange;
      padding: 20px;
      text-align: center;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    
    .item:hover {
      background: darkorange;
      cursor: pointer;
      transform: scale(1.05);
      transition: 0.3s;
    }
  </style>
</head>
<body>

  <h1>Our Cafe Menu</h1>

  <div class="menu">
    <div class="item">Zinger</div>
    <div class="item">Burger</div>
    <div class="item">Pizza</div>
    <div class="item">Fries</div>
    <div class="item">Shawarma</div>
    <div class="item">Broast</div>
    <div class="item">Sandwich</div>
    <div class="item">Roll</div>
  </div>

</body>
</html>
